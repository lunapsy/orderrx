<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>OrderRx Training Track</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        color: #1a1a1a;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      section { border-top: 1px solid #e0e0e0; padding: 8px 0; }
      .muted { color: #666; font-size: 11px; }
      button {
        font-size: 12px;
        padding: 4px 8px;
        cursor: pointer;
      }
      .row { display: flex; gap: 6px; align-items: center; }
      .site-row { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
      .site-row input[type=checkbox] { margin: 0; }
      .site-domain { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .danger { color: #b00020; }
      #pid { font-family: monospace; font-size: 11px; word-break: break-all; }
      #sites-list { max-height: 200px; overflow-y: auto; }
      input[type=text] { flex: 1; padding: 3px 6px; font-size: 12px; }
      .count { font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>OrderRx Training Track</h1>

    <section>
      <div class="muted">참여자 ID</div>
      <div id="pid">…</div>
    </section>

    <section>
      <div class="row">
        <label><input type="checkbox" id="consent-toggle" /> 수집 활성화</label>
        <span id="consent-state" class="muted"></span>
      </div>
    </section>

    <section>
      <div class="row">
        <strong>등록 도메인</strong>
        <span class="muted">(<span id="site-count">0</span>/30)</span>
      </div>
      <div class="row" style="margin-top: 4px;">
        <input type="text" id="new-domain" placeholder="example-pharm.co.kr" />
        <button id="add-domain-btn">추가</button>
      </div>
      <div id="sites-list"></div>
      <div class="row" style="margin-top: 6px;">
        <button id="export-sites-btn">도메인 목록 내보내기</button>
        <button id="import-sites-btn">가져오기</button>
        <input type="file" id="import-sites-file" accept="application/json" hidden />
      </div>
    </section>

    <section>
      <div>수집된 이벤트: <span id="event-count" class="count">0</span></div>
      <div id="recent-events" class="muted"></div>
      <div class="row" style="margin-top: 6px;">
        <button id="export-events-btn">내 데이터 내보내기</button>
        <button id="clear-events-btn" class="danger">전체 삭제</button>
      </div>
    </section>

    <section>
      <div class="muted">
        민감정보(비밀번호, 카드, 주민번호, 전화번호, 이메일 등)는 자동으로 차단/마스킹되어
        저장되지 않습니다. 상세는 문서 <code>event_schema_m1_detail.md</code> 참조.
      </div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
